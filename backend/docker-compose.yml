services:
  backendPonto:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sistema-ponto-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3001}
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://127.0.0.1:3001/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  backend_uploads:
