# ---------------------------------------------------------
# BLOCOS PORTA 80 (Acessíveis externamente via porta 9481)
# ---------------------------------------------------------

# Redireciona HTTP -> HTTPS para os subdomínios válidos
server {
    listen 80;
    server_name app.omnipunt.com api.omnipunt.com;
    
    # Útil se você acessar via http://seu-ip:9481
    return 301 https://$host$request_uri;
}

# Catch-all para porta 80 (Segurança)
server {
    listen 80 default_server;
    server_name _;
    return 404;
}

# ---------------------------------------------------------
# BLOCO FRONTEND (app.omnipunt.com) - PORTA 443
# ---------------------------------------------------------

server {
    listen 443 ssl;
    server_name app.omnipunt.com;

    # Re-resolve container IPs via Docker DNS (prevents stale cache after restarts)
    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/letsencrypt/live/app.omnipunt.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.omnipunt.com/privkey.pem;

    # ESSA LINHA É A CURA:
    # Ela diz para a sua aplicação que a conexão já é segura (HTTPS)
    # Evitando que o Node/React tente redirecionar de novo.
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    location / {
        proxy_pass http://frontend:80; # Fala com o 'expose' do container
        proxy_http_version 1.1;
    }

    location /api/v1/ {
        proxy_pass http://backendponto:3001/api/v1/;
    }

    # 3. Uploads
    location /uploads/ {
        proxy_pass http://backendponto:3001/uploads/;
    }

    # 4. Health Check
    location /health {
        proxy_pass http://backendponto:3001/health;
    }
}

# ---------------------------------------------------------
# BLOCO BACKEND (api.omnipunt.com) - PORTA 443
# ---------------------------------------------------------

server {
    listen 443 ssl;
    server_name api.omnipunt.com;

    # Re-resolve container IPs via Docker DNS (prevents stale cache after restarts)
    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/letsencrypt/live/api.omnipunt.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.omnipunt.com/privkey.pem;

    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    location / {
        set $backend_upstream backendponto;
        proxy_pass http://$backend_upstream:3001;
        proxy_http_version 1.1;
    }
}