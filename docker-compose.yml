services:
  backendponto:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sistema-ponto-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3001
    expose:
      - "3001"
    networks:
      - rede_externa_comum
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend-workers:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sistema-ponto-backend-workers
    restart: unless-stopped
    command: ["npm", "run", "start:workers"]
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
    networks:
      - rede_externa_comum
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_STRIPE_LINK_STARTER: ${VITE_STRIPE_LINK_STARTER}
        VITE_STRIPE_LINK_GROWTH: ${VITE_STRIPE_LINK_GROWTH}
        VITE_STRIPE_LINK_PRO: ${VITE_STRIPE_LINK_PRO}
    container_name: sistema-ponto-frontend
    restart: unless-stopped
    depends_on:
      backendponto:
        condition: service_healthy
    ports:
      - "9481:80"
    networks:
      - rede_externa_comum

volumes:
  backend_uploads:

networks:
  rede_externa_comum:
    driver: bridge
