# ---------------------------------------------------------
# BLOCOS PORTA 80 (Acessíveis externamente via porta 9481)
# ---------------------------------------------------------

# Redireciona HTTP -> HTTPS para os subdomínios válidos
server {
    listen 80;
    server_name app.omnipunt.com api.omnipunt.com;
    
    # Útil se você acessar via http://seu-ip:9481
    return 301 https://$host$request_uri;
}

# Catch-all para porta 80 (Segurança)
server {
    listen 80 default_server;
    server_name _;
    return 404;
}

# ---------------------------------------------------------
# BLOCO FRONTEND (app.omnipunt.com) - PORTA 443
# ---------------------------------------------------------

server {
    listen 443 ssl;
    server_name app.omnipunt.com;

    # Certificados SSL Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/app.omnipunt.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.omnipunt.com/privkey.pem;

    # Configurações de SSL recomendadas
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Headers padrão para todos os proxies deste bloco
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # 1. Proxy para o container do Frontend
    location / {
        proxy_pass http://frontend:80;
    }

    # 2. Rotas do Backend (API v1)
    location /api/v1/ {
        proxy_pass http://backendponto:3001/api/v1/;
    }

    # 3. Uploads
    location /uploads/ {
        proxy_pass http://backendponto:3001/uploads/;
    }

    # 4. Health Check
    location /health {
        proxy_pass http://backendponto:3001/health;
    }
}

# ---------------------------------------------------------
# BLOCO BACKEND (api.omnipunt.com) - PORTA 443
# ---------------------------------------------------------

server {
    listen 443 ssl;
    server_name api.omnipunt.com;

    ssl_certificate     /etc/letsencrypt/live/api.omnipunt.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.omnipunt.com/privkey.pem;

    location / {
        proxy_pass http://backendponto:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}